openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bookmarks - Social Ebook Reader API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: books
    description: Book operations
  - name: quotes
    description: Quote operations
  - name: comments
    description: Comment operations
  - name: library
    description: User library / uploaded EPUB operations
  - name: users
    description: User operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List / search canonical books
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createBook
      tags: [books]
      summary: Create a canonical book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookInput"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{bookId}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a book with its best comments and most-highlighted quotes
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Book detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookDetail"
        "404":
          description: Book not found

  /books/{bookId}/quotes:
    get:
      operationId: getBookQuotes
      tags: [quotes]
      summary: Community quotes for a book (reader overlay)
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Quotes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Find or create a quote in a book (by normalized text)
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteInput"
      responses:
        "200":
          description: Quote found or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{quoteId}/comments:
    get:
      operationId: getQuoteComments
      tags: [comments]
      summary: Get comments for a quote
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: filter
          in: query
          required: false
          schema:
            type: string
            enum: [best, friends, all]
            default: all
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Create a comment on a quote
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /quotes/{quoteId}/highlight:
    post:
      operationId: toggleHighlight
      tags: [quotes]
      summary: Toggle the current user's highlight on a quote
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HighlightInput"
      responses:
        "200":
          description: Highlight toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HighlightResult"

  /comments/{commentId}/like:
    post:
      operationId: likeComment
      tags: [comments]
      summary: Like a comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRef"
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResult"

  /comments/{commentId}/save:
    post:
      operationId: saveComment
      tags: [comments]
      summary: Save/unsave a comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRef"
      responses:
        "200":
          description: Save toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResult"

  /library:
    post:
      operationId: createLibraryEntry
      tags: [library]
      summary: Register an uploaded EPUB, extract metadata, and auto-match
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLibraryInput"
      responses:
        "201":
          description: Library entry created with match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryUploadResult"

  /library/{libraryId}:
    get:
      operationId: getLibraryEntry
      tags: [library]
      summary: Get a library entry (with EPUB url and matched book)
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Library entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryEntry"
        "404":
          description: Not found
    patch:
      operationId: matchLibraryEntry
      tags: [library]
      summary: Manually match a library entry to a canonical book
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualMatchInput"
      responses:
        "200":
          description: Library entry updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryEntry"

  /library/{libraryId}/location:
    put:
      operationId: updateReadingLocation
      tags: [library]
      summary: Save the reader's last reading location (CFI)
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReadingLocationInput"
      responses:
        "200":
          description: Library entry updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryEntry"
        "404":
          description: Not found

  /users/{userId}/library:
    get:
      operationId: getUserLibrary
      tags: [library]
      summary: List a user's uploaded books
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Library entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryEntry"

  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create or get a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          description: User created or retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users by username
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithFriendStatus"

  /users/{userId}/friends:
    get:
      operationId: getFriends
      tags: [users]
      summary: Get friends of a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Friends list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: addFriend
      tags: [users]
      summary: Add a friend
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FriendInput"
      responses:
        "200":
          description: Friend added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/friends/{friendId}:
    delete:
      operationId: removeFriend
      tags: [users]
      summary: Remove a friend
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: friendId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Friend removed

  /users/{userId}/saved-comments:
    get:
      operationId: getSavedComments
      tags: [users]
      summary: Get saved comments for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Book:
      type: object
      required: [id, title, author, description, coverColor, quoteCount, commentCount, highlightCount]
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        description:
          type: string
        coverColor:
          type: string
        quoteCount:
          type: integer
        commentCount:
          type: integer
        highlightCount:
          type: integer

    Quote:
      type: object
      required: [id, canonicalBookId, text, searchText, highlightCount, commentCount, highlightIntensity]
      properties:
        id:
          type: integer
        canonicalBookId:
          type: integer
        text:
          type: string
        searchText:
          type: string
          description: Distinctive leading substring used to locate the quote in an EPUB
        highlightCount:
          type: integer
        commentCount:
          type: integer
        highlightIntensity:
          type: number
          description: 0.0 to 1.0 representing community highlight strength
        highlightedByMe:
          type: boolean

    BookDetail:
      type: object
      required: [id, title, author, description, coverColor, quoteCount, commentCount, highlightCount, topQuotes, bestComments]
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        description:
          type: string
        coverColor:
          type: string
        quoteCount:
          type: integer
        commentCount:
          type: integer
        highlightCount:
          type: integer
        topQuotes:
          type: array
          items:
            $ref: "#/components/schemas/Quote"
        bestComments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"

    Comment:
      type: object
      required: [id, quoteId, userId, username, avatarColor, text, likeCount, likedByMe, savedByMe, createdAt]
      properties:
        id:
          type: integer
        quoteId:
          type: integer
        userId:
          type: integer
        username:
          type: string
        avatarColor:
          type: string
        text:
          type: string
        quoteText:
          type: string
        likeCount:
          type: integer
        likedByMe:
          type: boolean
        savedByMe:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CommentInput:
      type: object
      required: [userId, text]
      properties:
        userId:
          type: integer
        text:
          type: string
          minLength: 1

    CreateQuoteInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 8
          maxLength: 1000

    HighlightInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer
        userLibraryId:
          type: integer
        cfiRange:
          type: string

    HighlightResult:
      type: object
      required: [highlighted, highlightCount]
      properties:
        highlighted:
          type: boolean
        highlightCount:
          type: integer

    CreateBookInput:
      type: object
      required: [title, author]
      properties:
        title:
          type: string
          minLength: 1
        author:
          type: string
          minLength: 1
        description:
          type: string
        isbn:
          type: string

    CreateLibraryInput:
      type: object
      required: [userId, uploadURL]
      properties:
        userId:
          type: integer
        uploadURL:
          type: string
          description: The presigned upload URL (or object path) returned after upload

    ManualMatchInput:
      type: object
      required: [canonicalBookId]
      properties:
        canonicalBookId:
          type: integer

    LibraryEntry:
      type: object
      required: [id, userId, canonicalBookId, epubObjectPath, epubUrl, originalTitle, originalAuthor, originalIsbn, lastReadingLocation, createdAt, book]
      properties:
        id:
          type: integer
        userId:
          type: integer
        canonicalBookId:
          type: [integer, "null"]
        epubObjectPath:
          type: string
        epubUrl:
          type: string
        originalTitle:
          type: [string, "null"]
        originalAuthor:
          type: [string, "null"]
        originalIsbn:
          type: [string, "null"]
        lastReadingLocation:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        book:
          oneOf:
            - $ref: "#/components/schemas/Book"
            - type: "null"

    UpdateReadingLocationInput:
      type: object
      required: [location]
      properties:
        location:
          type: string
          minLength: 1

    MatchResult:
      type: object
      required: [status, book, candidates]
      properties:
        status:
          type: string
          enum: [matched, candidates, none]
        book:
          oneOf:
            - $ref: "#/components/schemas/Book"
            - type: "null"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Book"

    LibraryUploadResult:
      type: object
      required: [entry, match]
      properties:
        entry:
          $ref: "#/components/schemas/LibraryEntry"
        match:
          $ref: "#/components/schemas/MatchResult"

    LikeResult:
      type: object
      required: [liked, likeCount]
      properties:
        liked:
          type: boolean
        likeCount:
          type: integer

    SaveResult:
      type: object
      required: [saved]
      properties:
        saved:
          type: boolean

    UserRef:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer

    User:
      type: object
      required: [id, username, avatarColor, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        avatarColor:
          type: string
        createdAt:
          type: string
          format: date-time

    UserWithFriendStatus:
      type: object
      required: [id, username, avatarColor, createdAt, isFriend]
      properties:
        id:
          type: integer
        username:
          type: string
        avatarColor:
          type: string
        createdAt:
          type: string
          format: date-time
        isFriend:
          type: boolean

    UserInput:
      type: object
      required: [username]
      properties:
        username:
          type: string
          minLength: 2

    FriendInput:
      type: object
      required: [friendId]
      properties:
        friendId:
          type: integer
